<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム地域歌合</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f9f9f9; color: #333; }
        section { background: white; border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; }
        .poem-card { border-left: 4px solid #007bff; padding-left: 15px; margin-bottom: 15px; }
        .poem-text { font-size: 1.2rem; white-space: pre-wrap; margin: 10px 0; font-family: serif; }
        .meta { font-size: 0.85rem; color: #666; }
        .vote-btn { cursor: pointer; padding: 5px 10px; background-color: #007bff; color: white; border: none; border-radius: 3px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { margin-top: 10px; padding: 10px 20px; cursor: pointer; }
        .flex { display: flex; gap: 10px; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <h1>リアルタイム地域歌合 (Socket.io版)</h1>
    <p>別のブラウザやスマホから開いても、投稿や投票がリアルタイムに同期します。</p>

    <section>
        <h2>詩を投稿する（詠む）</h2>
        <form id="poemForm">
            <label for="area">地域</label>
            <select id="area">
                <option value="東京・下町エリア">東京・下町エリア</option>
                <option value="京都・洛中エリア">京都・洛中エリア</option>
                <option value="兵庫・但馬エリア">兵庫・但馬エリア</option>
            </select>
            <label for="author">詠み人</label>
            <input type="text" id="author" required>
            <label for="title">題（タイトル）</label>
            <input type="text" id="title" required>
            <label for="content">詩・歌</label>
            <textarea id="content" rows="4" required></textarea>
            <button type="submit">歌合に投稿する</button>
        </form>
    </section>

    <section>
        <h2>投稿された詩の一覧（歌合・リアルタイム判定）</h2>
        <div class="flex" style="margin-bottom: 15px;">
            <button onclick="changeFilter('all')">すべての地域</button>
            <button onclick="changeFilter('東京・下町エリア')">東京・下町</button>
            <button onclick="changeFilter('京都・洛中エリア')">京都・洛中</button>
            <button onclick="changeFilter('兵庫・但馬エリア')">兵庫・但馬</button>
        </div>
        <div id="poemList"></div>
    </section>

    </script>
</body>
</html>
